name: Dependency Vetting

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  dependency-vetting:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Enforce dependency policy
        run: npm run security:vet

      - name: Install dependencies without lifecycle scripts
        run: npm ci --ignore-scripts

      - name: Verify npm registry signatures and provenance
        timeout-minutes: 3
        run: npm audit signatures

      - name: Audit production dependencies
        timeout-minutes: 3
        run: npm audit --omit=dev --audit-level=high
