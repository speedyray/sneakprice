name: Exchange Capture

# Captures a MarketSnapshot per catalog symbol every hour and aggregates
# into IndexSnapshot rows in the same tick. Verified live 2026-04-29 with
# all 25 symbols capturing successfully against the prod Supabase tables.

on:
  schedule:
    - cron: "0 * * * *" # every hour at :00 UTC
  workflow_dispatch:

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger SPX exchange snapshot capture
        run: |
          RESPONSE=$(curl -s --max-time 320 \
            -w "\nHTTP_STATUS:%{http_code}" \
            -X GET "https://sneakpriceapp.com/api/cron/exchange-capture" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json")

          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | grep -v "HTTP_STATUS:")

          echo "HTTP Status: $HTTP_STATUS"
          echo "Response: $BODY"

          # Fail loudly on any non-2xx so silent drift (e.g. CRON_SECRET
          # rotation on either side) can't masquerade as success for days.
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "ERROR: capture returned non-200 status $HTTP_STATUS"
            exit 1
          fi
